<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SecureBank — Recherche</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --black: #0a0a0a; --white: #f5f2eb; --accent: #c8f04a; --accent2: #4af0c8;
      --gray: #1a1a1a; --gray2: #222; --border: rgba(255,255,255,0.07); --muted: rgba(245,242,235,0.4);
    }
    body { background: var(--black); color: var(--white); font-family: 'DM Sans', sans-serif; font-weight: 300; min-height: 100vh; }
    nav { display: flex; justify-content: space-between; align-items: center; padding: 1.5rem 3rem; border-bottom: 1px solid var(--border); }
    .logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.3rem; }
    .logo span { color: var(--accent); }
    .nav-links { display: flex; gap: 1.5rem; align-items: center; }
    nav a { color: var(--muted); text-decoration: none; font-size: 0.85rem; transition: color 0.2s; }
    nav a:hover { color: var(--white); }
    main { max-width: 860px; margin: 0 auto; padding: 4rem 2rem; }
    .page-header { margin-bottom: 3rem; animation: slideUp 0.5s ease forwards; }
    .page-tag {
      display: inline-block; border: 1px solid rgba(74,240,200,0.3); color: var(--accent2);
      font-size: 0.72rem; letter-spacing: 0.1em; text-transform: uppercase;
      padding: 0.25rem 0.7rem; margin-bottom: 1rem;
    }
    h1 { font-family: 'Syne', sans-serif; font-size: 2.2rem; font-weight: 800; letter-spacing: -0.03em; margin-bottom: 0.5rem; }
    .page-desc { font-size: 0.9rem; color: var(--muted); }
    /* SEARCH */
    .search-box { display: flex; gap: 0; margin-bottom: 1.5rem; animation: slideUp 0.6s ease forwards; position: relative; }
    .search-box input {
      flex: 1; background: var(--gray); border: 1px solid var(--border); border-right: none;
      color: var(--white); font-family: 'DM Sans', sans-serif; font-size: 0.95rem;
      padding: 0.9rem 1.2rem; outline: none; transition: border-color 0.2s;
    }
    .search-box input:focus { border-color: var(--accent2); }
    .search-box input::placeholder { color: rgba(245,242,235,0.2); }
    .search-box button {
      background: var(--accent2); color: var(--black); border: none;
      padding: 0.9rem 1.8rem; font-family: 'DM Sans', sans-serif; font-size: 0.9rem;
      cursor: pointer; transition: opacity 0.2s;
    }
    .search-box button:hover { opacity: 0.85; }
    .search-live { font-size: 0.75rem; color: var(--muted); margin-bottom: 1.5rem; margin-top: -1rem; }
    /* FILTERS */
    .filters { display: flex; gap: 0.5rem; margin-bottom: 2rem; flex-wrap: wrap; }
    .filter-btn {
      background: transparent; border: 1px solid var(--border); color: var(--muted);
      font-family: 'DM Sans', sans-serif; font-size: 0.78rem; padding: 0.35rem 0.9rem;
      cursor: pointer; transition: all 0.2s; letter-spacing: 0.04em;
    }
    .filter-btn:hover, .filter-btn.active {
      background: var(--gray); color: var(--white); border-color: rgba(255,255,255,0.2);
    }
    /* ALERT */
    .alert-box {
      background: rgba(255,80,80,0.08); border: 1px solid rgba(255,80,80,0.25);
      padding: 1rem 1.2rem; font-size: 0.85rem; color: #ff9090;
      margin-bottom: 1.5rem; display: none;
    }
    /* RESULTS */
    #results { animation: fadeIn 0.4s ease forwards; }
    .result-header {
      font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.08em;
      color: var(--muted); margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center;
    }
    .sql-block {
      background: #111; border: 1px solid rgba(200,240,74,0.2);
      padding: 0.7rem 1rem; margin-bottom: 1rem;
      font-size: 0.78rem; font-family: monospace; color: rgba(200,240,74,0.8);
      word-break: break-all;
    }
    .transaction {
      display: grid; grid-template-columns: auto 1fr auto auto;
      align-items: center; gap: 1.2rem; padding: 1rem 1.2rem;
      background: var(--gray); border: 1px solid var(--border);
      margin-bottom: 1px; transition: background 0.2s;
    }
    .transaction:hover { background: var(--gray2); }
    .tx-icon { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.9rem; flex-shrink: 0; }
    .tx-icon.in  { background: rgba(200,240,74,0.1); }
    .tx-icon.out { background: rgba(255,100,100,0.1); }
    .tx-label { font-size: 0.9rem; }
    .tx-date  { font-size: 0.78rem; color: var(--muted); margin-top: 0.1rem; }
    .tx-category {
      font-size: 0.72rem; letter-spacing: 0.06em; text-transform: uppercase;
      color: var(--muted); background: rgba(255,255,255,0.04);
      padding: 0.2rem 0.6rem; border: 1px solid var(--border);
    }
    .tx-amount { font-family: 'Syne', sans-serif; font-size: 1rem; font-weight: 700; }
    .tx-amount.in  { color: var(--accent); }
    .tx-amount.out { color: #ff9090; }
    .highlight { background: rgba(200,240,74,0.2); color: var(--accent); border-radius: 2px; padding: 0 2px; }
    .empty-state { text-align: center; padding: 3rem; color: var(--muted); border: 1px dashed var(--border); font-size: 0.9rem; }
    @keyframes slideUp { from { opacity:0; transform:translateY(14px); } to { opacity:1; transform:translateY(0); } }
    @keyframes fadeIn  { from { opacity:0; } to { opacity:1; } }
  </style>
</head>
<body>
  <nav>
    <div class="logo">Secure<span>Bank</span></div>
    <div class="nav-links">
      <a href="account.html">← Mon espace</a>
      <a href="index.html">Accueil</a>
    </div>
  </nav>

  <main>
    <div class="page-header">
      <div class="page-tag">Espace client</div>
      <h1>Mes transactions</h1>
      <p class="page-desc">Recherchez et filtrez l'historique de vos opérations bancaires.</p>
    </div>

    <div class="search-box">
      <input type="text" id="searchInput" placeholder="Loyer, Amazon, virement, salaire..." />
      <button onclick="handleSearch()">Rechercher</button>
    </div>
    <div class="search-live">🔍 La recherche se met à jour automatiquement en temps réel.</div>

    <div class="filters">
      <button class="filter-btn active" onclick="setFilter(this,'all')">Tout</button>
      <button class="filter-btn" onclick="setFilter(this,'in')">Entrées ↓</button>
      <button class="filter-btn" onclick="setFilter(this,'out')">Sorties ↑</button>
      <button class="filter-btn" onclick="setFilter(this,'virement')">Virements</button>
      <button class="filter-btn" onclick="setFilter(this,'paiement')">Paiements</button>
    </div>

    <div id="alert" class="alert-box"></div>
    <div id="results"></div>
  </main>

  <script>
    let activeFilter = 'all';
    let allResults   = [];
    let debounceTimer = null;
    const userId = sessionStorage.getItem('userId'); // Filtre par utilisateur connecté

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g,'&amp;').replace(/</g,'&lt;')
        .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function highlightText(text, query) {
      if (!query) return escapeHtml(text);
      const escaped = escapeHtml(text);
      const q = query.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
      return escaped.replace(new RegExp(q,'gi'), m => `<span class="highlight">${m}</span>`);
    }

    function setFilter(btn, type) {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activeFilter = type;
      renderResults(allResults, document.getElementById('searchInput').value);
    }

    function getFiltered(results) {
      if (activeFilter === 'all') return results;
      if (activeFilter === 'in'  || activeFilter === 'out') return results.filter(t => t.type === activeFilter);
      return results.filter(t => t.category.toLowerCase() === activeFilter);
    }

    function renderResults(results, query) {
      const filtered = getFiltered(results);
      const resultsEl = document.getElementById('results');
      const q = query.trim();

      const header = `
        <div class="result-header">
          <span>${filtered.length} résultat(s)${q ? ` pour "${escapeHtml(q)}"` : ''}</span>
          <span>${activeFilter !== 'all' ? `Filtre : ${activeFilter}` : ''}</span>
        </div>
      `;

      if (filtered.length === 0) {
        resultsEl.innerHTML = header + '<div class="empty-state">Aucune transaction trouvée.</div>';
        return;
      }

      const rows = filtered.map(tx => `
        <div class="transaction">
          <div class="tx-icon ${tx.type}">${tx.type === 'in' ? '↓' : '↑'}</div>
          <div>
            <div class="tx-label">${highlightText(tx.label, q)}</div>
            <div class="tx-date">${escapeHtml(tx.date)}</div>
          </div>
          <div class="tx-category">${highlightText(tx.category, q)}</div>
          <div class="tx-amount ${tx.type}">
            ${tx.type === 'in' ? '+' : '-'}${Math.abs(tx.amount).toLocaleString('fr-FR',{minimumFractionDigits:2})} €
          </div>
        </div>
      `).join('');

      resultsEl.innerHTML = header + rows;
    }

    async function handleSearch() {
      const query   = document.getElementById('searchInput').value;
      const alertEl = document.getElementById('alert');
      alertEl.style.display = 'none';

      try {
        const params = new URLSearchParams({ q: query });
        if (userId) params.append('userId', userId);

        const res  = await fetch(`/api/search?${params}`);
        const data = await res.json();

        if (!res.ok) {
          alertEl.style.display = 'block';
          alertEl.innerHTML = `
            💥 <strong>Erreur SQL détectée :</strong><br>
            <code>${escapeHtml(data.error)}</code><br><br>
            <small>Requête : <code>${escapeHtml(data.query)}</code></small>
          `;
          document.getElementById('results').innerHTML = '';
          return;
        }

        allResults = data.results;
        renderResults(allResults, query);

        // Afficher la requête SQL si injection détectée (pédagogique)
        if (query.includes("'") || query.toLowerCase().includes('select') || query.includes('--')) {
          const sqlInfo = document.createElement('div');
          sqlInfo.className = 'sql-block';
          sqlInfo.innerHTML = `<span style="color:#555;">SQL exécuté → </span>${escapeHtml(data.sql_executed)}`;
          document.getElementById('results').prepend(sqlInfo);
        }

      } catch (err) {
        alertEl.style.display = 'block';
        alertEl.innerHTML = `❌ Erreur réseau : ${err.message}`;
        document.getElementById('results').innerHTML = '';
      }
    }

    // Recherche en temps réel avec debounce
    document.getElementById('searchInput').addEventListener('input', () => {
      clearTimeout(debounceTimer);
      debounceTimer = setTimeout(handleSearch, 300);
    });

    document.getElementById('searchInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') { clearTimeout(debounceTimer); handleSearch(); }
    });

    // Chargement initial
    handleSearch();
  </script>
</body>
</html>
