<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SecureBank — Mon espace</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:ital,wght@0,300;0,400;1,300&display=swap"
        rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --black: #0a0a0a;
            --white: #f5f2eb;
            --accent: #c8f04a;
            --accent2: #4af0c8;
            --gray: #1a1a1a;
            --gray2: #222;
            --border: rgba(255, 255, 255, 0.07);
            --muted: rgba(245, 242, 235, 0.4);
        }

        body {
            background: var(--black);
            color: var(--white);
            font-family: 'DM Sans', sans-serif;
            font-weight: 300;
            min-height: 100vh;
        }

        /* NAV */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.2rem 3rem;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            background: rgba(10, 10, 10, 0.9);
            backdrop-filter: blur(12px);
            z-index: 10;
        }

        .logo {
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: 1.3rem;
        }

        .logo span {
            color: var(--accent);
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        .nav-user {
            font-size: 0.85rem;
            color: var(--muted);
        }

        .nav-user strong {
            color: var(--white);
        }

        .btn-logout {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--muted);
            font-family: 'DM Sans', sans-serif;
            font-size: 0.8rem;
            padding: 0.4rem 1rem;
            cursor: pointer;
            transition: all 0.2s;
            letter-spacing: 0.04em;
        }

        .btn-logout:hover {
            border-color: rgba(255, 255, 255, 0.3);
            color: var(--white);
        }

        /* MAIN */
        main {
            max-width: 1000px;
            margin: 0 auto;
            padding: 3rem 2rem;
        }

        /* BALANCE CARDS */
        .cards-grid {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr;
            gap: 1px;
            background: var(--border);
            border: 1px solid var(--border);
            margin-bottom: 3rem;
        }

        .card {
            background: var(--gray);
            padding: 2rem;
            position: relative;
            animation: fadeIn 0.5s ease forwards;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
        }

        .card:first-child::before {
            background: linear-gradient(90deg, var(--accent), var(--accent2));
        }

        .card:nth-child(2)::before {
            background: var(--accent);
        }

        .card:nth-child(3)::before {
            background: #ff9090;
        }

        .card-label {
            font-size: 0.72rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--muted);
            margin-bottom: 0.6rem;
        }

        .card-value {
            font-family: 'Syne', sans-serif;
            font-size: 2rem;
            font-weight: 700;
        }

        .card-value.main {
            font-size: 2.6rem;
        }

        .card-value.green {
            color: var(--accent);
        }

        .card-value.teal {
            color: var(--accent2);
        }

        .card-value.red {
            color: #ff9090;
        }

        .card-sub {
            font-size: 0.78rem;
            color: var(--muted);
            margin-top: 0.4rem;
        }

        /* ACTIONS RAPIDES */
        .section-title {
            font-family: 'Syne', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            letter-spacing: -0.01em;
            margin-bottom: 1rem;
            color: var(--muted);
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 0.1em;
        }

        .quick-actions {
            display: flex;
            gap: 0.8rem;
            margin-bottom: 3rem;
            flex-wrap: wrap;
        }

        .action-btn {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            background: var(--gray);
            border: 1px solid var(--border);
            color: var(--white);
            font-family: 'DM Sans', sans-serif;
            font-size: 0.85rem;
            padding: 0.7rem 1.2rem;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
        }

        .action-btn:hover {
            background: var(--gray2);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .action-btn .icon {
            font-size: 1rem;
        }

        /* TRANSACTIONS */
        .transactions-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .tx-count {
            font-size: 0.8rem;
            color: var(--muted);
        }

        .transaction {
            display: grid;
            grid-template-columns: auto 1fr auto auto;
            align-items: center;
            gap: 1.2rem;
            padding: 1rem 1.2rem;
            background: var(--gray);
            border: 1px solid var(--border);
            margin-bottom: 1px;
            transition: background 0.2s;
            animation: slideUp 0.4s ease forwards;
        }

        .transaction:hover {
            background: var(--gray2);
        }

        .tx-icon {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9rem;
        }

        .tx-icon.in {
            background: rgba(200, 240, 74, 0.1);
        }

        .tx-icon.out {
            background: rgba(255, 100, 100, 0.1);
        }

        .tx-label {
            font-size: 0.9rem;
        }

        .tx-date {
            font-size: 0.78rem;
            color: var(--muted);
            margin-top: 0.1rem;
        }

        .tx-category {
            font-size: 0.72rem;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: var(--muted);
            background: rgba(255, 255, 255, 0.04);
            padding: 0.2rem 0.6rem;
            border: 1px solid var(--border);
        }

        .tx-amount {
            font-family: 'Syne', sans-serif;
            font-size: 1rem;
            font-weight: 700;
        }

        .tx-amount.in {
            color: var(--accent);
        }

        .tx-amount.out {
            color: #ff9090;
        }

        .empty-state {
            text-align: center;
            padding: 3rem;
            color: var(--muted);
            border: 1px dashed var(--border);
            font-size: 0.9rem;
        }

        /* LOADING */
        #loading {
            text-align: center;
            padding: 4rem;
            color: var(--muted);
            font-size: 0.9rem;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(8px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>

    <nav>
        <div class="logo">Secure<span>Bank</span></div>
        <div class="nav-right">
            <div class="nav-user">Connecté en tant que <strong id="navName">...</strong></div>
            <button class="btn-logout" onclick="logout()">Déconnexion</button>
        </div>
    </nav>

    <main>
        <div id="loading">⏳ Chargement de votre espace...</div>

        <div id="content" style="display:none">

            <!-- CARTES SOLDE -->
            <div class="cards-grid">
                <div class="card">
                    <div class="card-label">Solde disponible</div>
                    <div class="card-value main green" id="balance">—</div>
                    <div class="card-sub" id="userEmail">—</div>
                </div>
                <div class="card">
                    <div class="card-label">Total entrées</div>
                    <div class="card-value teal" id="totalIn">—</div>
                    <div class="card-sub">Ce compte</div>
                </div>
                <div class="card">
                    <div class="card-label">Total sorties</div>
                    <div class="card-value red" id="totalOut">—</div>
                    <div class="card-sub">Ce compte</div>
                </div>
            </div>

            <!-- ACTIONS RAPIDES -->
            <div class="section-title">Actions rapides</div>
            <div class="quick-actions">
                <a href="search.html" class="action-btn"><span class="icon">🔍</span> Rechercher une transaction</a>
                <button class="action-btn" onclick="alert('Fonctionnalité demo')"><span class="icon">↑</span> Faire un
                    virement</button>
                <button class="action-btn" onclick="alert('Fonctionnalité demo')"><span class="icon">📄</span>
                    Télécharger le relevé</button>
                <button class="action-btn" onclick="alert('Fonctionnalité demo')"><span class="icon">⚙️</span>
                    Paramètres</button>
            </div>

            <!-- TRANSACTIONS -->
            <div class="transactions-header">
                <div class="section-title" style="margin-bottom:0">Historique des transactions</div>
                <div class="tx-count" id="txCount"></div>
            </div>
            <div id="txList"></div>

        </div>
    </main>

    <script>
        function fmt(amount) {
            return amount.toLocaleString('fr-FR', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + ' €';
        }

        function logout() {
            sessionStorage.removeItem('userId');
            sessionStorage.removeItem('userName');
            window.location.href = 'login.html';
        }

        async function loadAccount() {
            const userId = sessionStorage.getItem('userId');
            if (!userId) {
                window.location.href = 'login.html';
                return;
            }

            try {
                const res = await fetch(`/api/account/${userId}`);
                const data = await res.json();

                if (!data.success) {
                    window.location.href = 'login.html';
                    return;
                }

                // Remplir les infos
                document.getElementById('navName').textContent = data.user.name;
                document.getElementById('balance').textContent = fmt(data.balance);
                document.getElementById('userEmail').textContent = data.user.email;
                document.getElementById('totalIn').textContent = '+' + fmt(data.totalIn);
                document.getElementById('totalOut').textContent = '-' + fmt(data.totalOut);
                document.getElementById('txCount').textContent = `${data.transactions.length} transaction(s)`;

                // Remplir les transactions
                const list = document.getElementById('txList');
                if (data.transactions.length === 0) {
                    list.innerHTML = '<div class="empty-state">Aucune transaction pour le moment.</div>';
                } else {
                    list.innerHTML = data.transactions.map(tx => `
            <div class="transaction">
              <div class="tx-icon ${tx.type}">${tx.type === 'in' ? '↓' : '↑'}</div>
              <div>
                <div class="tx-label">${tx.label}</div>
                <div class="tx-date">${tx.date}</div>
              </div>
              <div class="tx-category">${tx.category}</div>
              <div class="tx-amount ${tx.type}">
                ${tx.type === 'in' ? '+' : '-'}${fmt(Math.abs(tx.amount))}
              </div>
            </div>
          `).join('');
                }

                document.getElementById('loading').style.display = 'none';
                document.getElementById('content').style.display = 'block';

            } catch (err) {
                document.getElementById('loading').textContent = '❌ Erreur : ' + err.message;
            }
        }

        loadAccount();
    </script>

</body>

</html>
